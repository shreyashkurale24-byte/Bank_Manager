<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — BANK Manager Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04070d;--surf:#090f1a;--panel:#0e1624;--b1:#1a2840;
  --gold:#f0c040;--gold2:#e8963c;--cyan:#00d4ff;--green:#00f5a0;
  --red:#ff4466;--tx:#ccdcee;--dim:#4a6070;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Syne',sans-serif;background:var(--bg);color:var(--tx);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
/* Grid bg */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(240,192,64,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(240,192,64,.035) 1px,transparent 1px);
  background-size:60px 60px;
  animation:gridMove 14s linear infinite;
}
@keyframes gridMove{from{background-position:0 0}to{background-position:60px 60px}}
/* Gold orb */
body::after{
  content:'';position:fixed;
  width:700px;height:700px;
  background:radial-gradient(circle,rgba(240,192,64,.1) 0%,transparent 65%);
  border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);
  animation:orbPulse 4s ease-in-out infinite alternate;pointer-events:none;
}
@keyframes orbPulse{from{transform:translate(-50%,-50%) scale(.8)}to{transform:translate(-50%,-50%) scale(1.1)}}

.login-wrap{
  position:relative;z-index:1;
  width:420px;max-width:95%;
  animation:boxIn .6s cubic-bezier(.2,1,.3,1);
}
@keyframes boxIn{from{opacity:0;transform:translateY(32px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

.login-logo{text-align:center;margin-bottom:32px}
.login-icon{
  width:72px;height:72px;border-radius:18px;margin:0 auto 16px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;font-size:34px;
  box-shadow:0 8px 32px rgba(240,192,64,.4);
}
.login-logo h1{
  font-size:28px;font-weight:900;
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.login-logo p{font-size:12px;color:var(--dim);font-family:'Space Mono',monospace;margin-top:4px;letter-spacing:2px}

.login-card{
  background:var(--surf);border:1px solid var(--b1);border-radius:16px;
  padding:32px;box-shadow:0 24px 80px rgba(0,0,0,.7);
  position:relative;overflow:hidden;
}
.login-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),var(--gold2),var(--cyan));
}

.fg{margin-bottom:20px}
.fl{
  display:block;font-size:12px;font-weight:600;color:var(--dim);
  margin-bottom:7px;letter-spacing:.5px;
}
.fi{
  width:100%;background:var(--panel);border:1px solid var(--b1);
  color:var(--tx);padding:12px 14px;border-radius:9px;
  font-family:'Space Mono',monospace;font-size:13px;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.fi:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(240,192,64,.12)}
.fi::placeholder{color:var(--dim)}

.pw-wrap{position:relative}
.pw-wrap .fi{padding-right:44px}
.pw-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--dim);cursor:pointer;
  font-size:16px;padding:4px;transition:color .15s;
}
.pw-toggle:hover{color:var(--gold)}

.btn-login{
  width:100%;padding:13px;border:none;border-radius:9px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#06090e;font-family:'Syne',sans-serif;font-weight:800;
  font-size:15px;cursor:pointer;letter-spacing:.5px;
  transition:all .2s;margin-top:8px;
}
.btn-login:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 6px 24px rgba(240,192,64,.4)}
.btn-login:active{transform:translateY(0)}

.err-box{
  background:rgba(255,68,102,.1);border:1px solid rgba(255,68,102,.3);
  color:var(--red);padding:11px 14px;border-radius:8px;
  font-size:13px;margin-bottom:20px;display:flex;align-items:center;gap:8px;
  animation:shake .4s ease;
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.hint-box{
  background:rgba(240,192,64,.07);border:1px solid rgba(240,192,64,.2);
  border-radius:8px;padding:11px 14px;margin-top:20px;
  font-family:'Space Mono',monospace;font-size:11px;color:var(--dim);
  line-height:1.7;
}
.hint-box strong{color:var(--gold)}

/* Corner decorations */
.corner{position:absolute;width:20px;height:20px;border-color:rgba(240,192,64,.3);border-style:solid}
.corner.tl{top:12px;left:12px;border-width:1px 0 0 1px}
.corner.tr{top:12px;right:12px;border-width:1px 1px 0 0}
.corner.bl{bottom:12px;left:12px;border-width:0 0 1px 1px}
.corner.br{bottom:12px;right:12px;border-width:0 1px 1px 0}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="login-icon">🏦</div>
    <h1>BANK MANAGER</h1>
    <p>PRO · SECURE PORTAL</p>
  </div>

  <div class="login-card">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    {% if error %}
    <div class="err-box">⚠ {{ error }}</div>
    {% endif %}

    <form method="post" autocomplete="off">
      <div class="fg">
        <label class="fl" for="username">Username</label>
        <input class="fi" type="text" id="username" name="username"
               placeholder="Enter username" autocomplete="off" autofocus>
      </div>
      <div class="fg">
        <label class="fl" for="password">Password</label>
        <div class="pw-wrap">
          <input class="fi" type="password" id="password" name="password"
                 placeholder="Enter password">
          <button type="button" class="pw-toggle" id="pwToggle" title="Show/Hide">👁</button>
        </div>
      </div>
      <button type="submit" class="btn-login">🔐 &nbsp; Sign In</button>
    </form>

    <div class="hint-box">
      Demo credentials:<br>
      <strong>admin</strong> / <strong>admin123</strong> &nbsp;·&nbsp;
      <strong>manager</strong> / <strong>bank2024</strong>
    </div>
  </div>
</div>

<script>
document.getElementById('pwToggle').addEventListener('click',function(){
  const inp = document.getElementById('password');
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  this.textContent = show ? '🙈' : '👁';
});
// Enter key submits
document.addEventListener('keydown',e=>{
  if(e.key==='Enter') e.target.closest('form')?.submit();
});
</script>
</body>
</html>
